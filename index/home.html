<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style/home.css">
    <title>Casa do Queijo</title>      
</head>

  <body>

    <header>
        <div class="logo">
            Casa Do<br>Queijo!
        </div>

        <nav>
            <a href="sobrenos.html">Sobre</a>
            <a href="produtos.html">Catálogo</a>
            <a href="contato.html" class="btn">Contato</a>
        </nav>
    </header>

    <section class="hero">
        <div class="content">
            <h1>O MELHOR QUEIJO DA REGIÃO</h1>
            <p>Conheça o melhor distribuidor de<br>queijo do Sul de Minas</p>

            <div class="buttons">
                <a href="sobrenos.html" class="btn-outline">Sobre</a>
                <a href="produtos.html" class="btn">Catálogo</a>
                <a href="contato.html"  class="btn">Contato</a>
            </div>
        </div>
    </section>

   <section class="carrossel-section">
        <h2 class="carrossel-titulo">Nossos Produtos</h2>
 
        <div class="carrossel-wrapper">
 
            <button class="carrossel-btn prev" aria-label="Imagem anterior">&#8249;</button>
 
            <div class="carrossel-track-container">
                <div class="carrossel-track">
 
            
                    <div class="slide">
                        <img src="../images/fotocarrosel1.jpeg">
                        <p class="slide-legenda">Doces e Queijos</p>
                    </div>
                    <div class="slide">
                        <img src="../images/fotocarrossel2.jpeg">
                        <p class="slide-legenda">Queijo Provolone Especial</p>
                    </div>
                    <div class="slide">
                        <img src="../images/fotocarrossel3.jpeg">
                        <p class="slide-legenda">Queijo Parmesão</p>
                    </div>
                    <div class="slide">
                        <img src="../images/fotocarrossel4.jpeg">
                        <p class="slide-legenda">Variedade de Canastras Artesanais</p>
                    </div>
                    <div class="slide">
                        <img src="../images/fotocarrossel5.jpeg">
                        <p class="slide-legenda">Queijos Temperados</p>
                    </div>
 
                </div>
            </div>
 
            <button class="carrossel-btn next" aria-label="Próxima imagem">&#8250;</button>
 
        </div>
 
        <div class="carrossel-dots"></div>
 
    </section>
    

    <script src="../script/home.js"></script>
